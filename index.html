		<h1>一起探索中国桥梁之美——<em><strong>赵州桥</strong></em></h1>
		<blockquote>
			<div class="content">

					<li><h2>桥史</h2></li>
				</ul>
				<p>千年洨水汤汤，唯有赵州桥，静立成诗，落笔封神。</p>
				<p>隋代<a href="https://baike.baidu.com/item/%E6%9D%8E%E6%98%A5/1583" target="_blank">李春</a>，打破古法<ruby>桎梏<rt>zhì gù</rt></ruby>，缔造出世界现存<strong>最早</strong>、保存<strong>最完整</strong>的单孔敞肩石拱桥。28道拱券纵向并列，肩载四小拱，既卸桥身之重，又畅汛期之水。它有青灰石料的沉稳，历经千年的坚韧，是<a href="https://baike.baidu.com/item/%E5%85%A8%E5%9B%BD%E9%87%8D%E7%82%B9%E6%96%87%E7%89%A9%E4%BF%9D%E6%8A%A4%E5%8D%95%E4%BD%8D/2960685?fromModule=lemma_inlink" target="_blank">全国重点文保单位</a>，更是一座无需言说的文明坐标。</p>
			</div>
